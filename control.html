<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>8號時間迷宮｜控制頁</title>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>
<style>
body{background:#111;color:#f4e6c8;font-family:"Noto Sans TC",sans-serif;padding:20px;}section{border:1px solid #8b6b3e;padding:16px;margin-bottom:16px;border-radius:14px;}h2{margin-bottom:10px;}button{font-size:18px;padding:10px 14px;margin:5px;border-radius:10px;border:1px solid #d0a45a;background:#2a2118;color:#f4e6c8;}
.diceSection button{

  font-size:54px;

  padding:28px 38px;

  min-width:120px;
  min-height:120px;

  border-radius:22px;

  font-weight:bold;
}

.bigSection h2{font-size:48px;}
.bigSection h3{font-size:36px;}
.bigSection button{
  font-size:36px;
  padding:22px 30px;
  border-radius:18px;
  min-height:88px;
}
.bigSection{padding:30px;}


button:active{background:#6b4a22;}.row{display:flex;gap:20px;}.col{flex:1;border:1px solid #5a4525;padding:10px;border-radius:10px;}#battleTurn{margin-bottom:12px;font-size:22px;color:#ffd36a;}#battleLog{margin-top:12px;font-size:18px;white-space:pre-line;}
</style>
</head>
<body>
<h1>⚙️ 控制頁</h1>
<section><h2>遊戲控制</h2><button onclick="resetGame()">重置遊戲</button></section>
<section class="bigSection"><h2>玩家職業</h2><button onclick="addPlayer('鍛時者',30,'6+')">鍛時者</button><button onclick="addPlayer('軌跡者',20,'5+')">軌跡者</button><button onclick="addPlayer('干涉者',20,'6+')">干涉者</button><button onclick="addPlayer('潛行者',20,'6+')">潛行者</button></section>
<section class="bigSection"><h2>玩家攻擊力 / 防禦力</h2><div class="row"><div class="col"><h3>冒險者1</h3><button onclick="setPlayerAtk('player1',3)">攻擊=3</button><button onclick="addPlayerAtk('player1',3)">+3</button><br><button onclick="setPlayerDef('player1',0)">防禦=0</button><button onclick="addPlayerDef('player1',1)">+1</button></div><div class="col"><h3>冒險者2</h3><button onclick="setPlayerAtk('player2',3)">攻擊=3</button><button onclick="addPlayerAtk('player2',3)">+3</button><br><button onclick="setPlayerDef('player2',0)">防禦=0</button><button onclick="addPlayerDef('player2',1)">+1</button></div></div></section>

<section class="bigSection"><h2>干涉</h2>

<div class="row">

  <div class="col">

    <h3>冒險者1 使用</h3>

    <button onclick="useInterfereTarget('player1','player1')">
      冒險者1 +2
    </button>

    <button onclick="useInterfereTarget('player1','player2')">
      冒險者2 +2
    </button>

    <button onclick="useInterfereOnEnemy('player1')">
      敵人 -2
    </button>
	<button onclick="addInterfere('player1')">
  干涉+1 
</button>

  </div>

  <div class="col">

    <h3>冒險者2 使用</h3>

    <button onclick="useInterfereTarget('player2','player1')">
      冒險者1 +2
    </button>

    <button onclick="useInterfereTarget('player2','player2')">
      冒險者2 +2
    </button>

    <button onclick="useInterfereOnEnemy('player2')">
      敵人 -2
    </button>

<button onclick="addInterfere('player2')">
  干涉+1 
</button>

  </div>

</div>

</section>

<section class="bigSection"><h2>使用中道具</h2><button onclick="useInfoMerchant()">情報商（永久顯示幸運房）</button><div class="row"><div class="col"><h3>冒險者1</h3><button onclick="toggleActive('player1','weaponBoost')">強化武器</button><button onclick="useShield('player1')">時間護盾</button></div><div class="col"><h3>冒險者2</h3><button onclick="toggleActive('player2','weaponBoost')">強化武器</button><button onclick="useShield('player2')">時間護盾</button></div></div></section>
<section class="bigSection"><h2>迷宮移動</h2>
<button onclick="moveRoom('L')">← 左</button>
<button onclick="moveRoom('M')">↑ 中</button>
<button onclick="moveRoom('R')">→ 右</button>
<button onclick="goBackRoom()">↩ 返回上一房</button>
</section>



<section class="bigSection"><h2>血量控制</h2>

<div class="row">
<div class="col">
<h3>冒險者1</h3>
<button onclick="changeHp('players/player1',6)">+6</button>
<button onclick="changeHp('players/player1',12)">+12</button>
</div>

<div class="col">
<h3>冒險者2</h3>
<button onclick="changeHp('players/player2',6)">+6</button>
<button onclick="changeHp('players/player2',12)">+12</button>
</div>
</div>
</section>


<section class="diceSection"><h2>🎲 擲骰子結果</h2>

<div id="battleTurn">目前狀態：尚未開始戰鬥</div><button onclick="rollDice(2)">2</button><button onclick="rollDice(3)">3</button><button onclick="rollDice(4)">4</button><button onclick="rollDice(5)">5</button><button onclick="rollDice(6)">6</button><button onclick="rollDice(7)">7</button><button onclick="rollDice(8)">8</button><button onclick="rollDice(9)">9</button><button onclick="rollDice(10)">10</button><button onclick="rollDice(11)">11</button><button onclick="rollDice(12)">12</button><div id="battleLog"></div></section>

<section>
<h2>事件 / 怪物完成</h2>
<button onclick="clearResultPopup()">完成，隱藏獎勵框</button>
</section>

<script>
var firebaseConfig = {
  // 貼你的 firebaseConfig
  
  apiKey: "AIzaSyA9463bcgt_R9KWU5dXx0xrKQtCEBdLwkE",
  authDomain: "yume-game.firebaseapp.com",
  databaseURL: "https://yume-game-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "yume-game",
  storageBucket: "yume-game.firebasestorage.app",
  messagingSenderId: "902572378872",
  appId: "1:902572378872:web:293ba940026c628b94c90d",
  measurementId: "G-BD8GMZR2B5"
};


if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

var db=firebase.database();
const urlParams=new URLSearchParams(window.location.search);
const GAME_ID=urlParams.get("game") || "default";
const gameRef=db.ref("games/"+GAME_ID);



let battleState={active:false,phase:"player1"};
function syncBattleTurn(){gameRef.child("battleTurn").set(battleState.active?battleState.phase:"none");}
function updateBattleText(){const el=document.getElementById("battleTurn");if(!battleState.active){el.innerText="目前狀態：尚未開始戰鬥";syncBattleTurn();return;}if(battleState.phase==="player1")el.innerText="目前攻擊方：冒險者1";if(battleState.phase==="player2")el.innerText="目前攻擊方：冒險者2";if(battleState.phase==="enemy")el.innerText="目前攻擊方：怪物（AOE）";syncBattleTurn();}
function setBattleLog(text){document.getElementById("battleLog").innerText=text||"";}
function makePlayer(job,maxHp,hit){
  return{
    job:job,
    hp:maxHp,
    maxHp:maxHp,
    atk:3,
    hit:hit,
    def:0,
    interfere:job==="干涉者"?5:0,
    active:{
      weaponBoost:false,
      shieldOwned:false,
      shieldTurns:0,
      interfereBuff:0
    }
  };
}
function addPlayer(job,maxHp,hit){gameRef.child("players").once("value").then(s=>{const p=s.val()||{};if(!p.player1||!p.player1.job)gameRef.child("players/player1").set(makePlayer(job,maxHp,hit));else if(!p.player2||!p.player2.job)gameRef.child("players/player2").set(makePlayer(job,maxHp,hit));else alert("已有兩位冒險者");});}
function setPlayerAtk(player,val){gameRef.child("players/"+player+"/atk").set(val);}function addPlayerAtk(player,val){gameRef.child("players/"+player+"/atk").once("value").then(s=>gameRef.child("players/"+player+"/atk").set((Number(s.val())||0)+val));}
function setPlayerDef(player,val){gameRef.child("players/"+player+"/def").set(val);}function addPlayerDef(player,val){gameRef.child("players/"+player+"/def").once("value").then(s=>gameRef.child("players/"+player+"/def").set((Number(s.val())||0)+val));}
function setInterfere(player,val){gameRef.child("players/"+player+"/interfere").set(val);}

function addInterfere(player){

  gameRef.child("players/"+player+"/interfere")
  .once("value")
  .then(s=>{

    const now=Number(s.val()||0)+1;

    gameRef.child(
      "players/"+player+"/interfere"
    ).set(now);

    setBattleLog(
      (player==="player1"?"冒險者1":"冒險者2")
      +" 的干涉次數 +1"
    );
  });
}

function useInterfereTarget(user,target){

  gameRef.once("value").then(s=>{

    const data=s.val()||{};

    const p=data.players?.[user];

    if(!p)return;

    if(p.job!=="干涉者"){
      setBattleLog("只有干涉者可以使用干涉。");
      return;
    }

    if(Number(p.interfere||0)<=0){
      setBattleLog("干涉次數不足。");
      return;
    }

    gameRef.update({

      ["players/"+user+"/interfere"]:
        Number(p.interfere)-1,

      ["players/"+target+"/active/interfereBuff"]:
        2
    });

    const userName=
      user==="player1"
      ?"冒險者1"
      :"冒險者2";

    const targetName=
      target==="player1"
      ?"冒險者1"
      :"冒險者2";

    setBattleLog(
      userName+
      " 對 "+
      targetName+
      " 使用 干涉+2"
    );
  });
}
function useInterfereOnEnemy(player){

  gameRef.once("value").then(s=>{

    const data=s.val()||{};

    if(data.eventState&&data.eventState.active){
      setBattleLog("事件房間不能使用敵人 -2。");
      return;
    }

    if(!battleState.active){
      setBattleLog("只有戰鬥中可以對敵人使用干涉。");
      return;
    }

    const p=data.players?.[player];

    if(!p)return;

    if(p.job!=="干涉者"){
      setBattleLog("只有干涉者可以使用干涉。");
      return;
    }

    if(Number(p.interfere||0)<=0){
      setBattleLog("干涉次數不足。");
      return;
    }

    gameRef.update({
      ["players/"+player+"/interfere"]:Number(p.interfere)-1,
      "enemy/interfereDebuff":2
    });

    setBattleLog(
      (player==="player1"?"冒險者1":"冒險者2")
      +" 對敵人施加 干涉-2"
    );
  });
}
function toggleActive(player,key){gameRef.child("players/"+player+"/active/"+key).once("value").then(s=>gameRef.child("players/"+player+"/active/"+key).set(!s.val()));}
function useShield(player){

  gameRef.child("players/"+player+"/active").once("value").then(s=>{

    const active=s.val()||{};

    if(!active.shieldOwned && Number(active.shieldTurns||0)===0){

      gameRef.child("players/"+player+"/active/shieldOwned").set(true);
      setBattleLog(userName+" 獲得時間護盾。");
      return;
    }

    if(active.shieldOwned && Number(active.shieldTurns||0)===0){

      gameRef.child("players/"+player+"/active").update({
        shieldOwned:false,
        shieldTurns:3
      });

      setBattleLog(userName+" 啟動時間護盾：3回合。");
      return;
    }

    if(Number(active.shieldTurns||0)>0){
      setBattleLog(userName+" 的時間護盾已在生效中。");
    }
  });
}

function useInfoMerchant(){gameRef.child("infoMerchant").set(true);setBattleLog("情報商已啟用：幸運房位置永久顯示。");}
function changeHp(path,amount){gameRef.child(path).once("value").then(s=>{const d=s.val();if(!d)return;const hp=Number(d.hp)||0,max=Number(d.maxHp)||0;gameRef.child(path+"/hp").set(Math.max(0,Math.min(max,hp+amount)));});}
function setEnemy(name,hp,atk,hit,drop,visual){
  gameRef.child("enemy").set({
    name:name,
    hp:hp,
    maxHp:hp,
	
    atk:atk,
    hit:hit,
	
    drop:drop,
	
	interfereDebuff:0
  });

  setVisualImage(visual || "map");
}
function setVisualImage(name){
  gameRef.child("visualImage").set(name);
}

function clearEnemy(){

  gameRef.child("enemy").set({
    name:"未出現",
    hp:0,
    maxHp:0,
    atk:0,
    hit:"-",
    drop:"",
    interfereDebuff:0
  });
}
function randomPick(arr){return arr[Math.floor(Math.random()*arr.length)];}function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}
function generateRoomTypes(){const roomTypes={};const a=shuffle(["monster","monster","monster","monster","monster","question","question","question","luck"]);for(let i=1;i<=9;i++)roomTypes["A"+i]=a[i-1];const b=shuffle(["monster","monster","monster","monster","monster","monster","monster","question","question","question","question","luck"]);for(let i=1;i<=12;i++)roomTypes["B"+i]=b[i-1];return roomTypes;}
const moveMap={start:{L:"A1",M:"A2",R:"A3"},A1:{L:"A4",R:"A5"},A2:{L:"A4",M:"A5",R:"A6"},A3:{L:"A5",R:"A6"},A4:{L:"A7",R:"A8"},A5:{L:"A7",M:"A8",R:"A9"},A6:{L:"A8",R:"A9"},A7:{M:"midBoss"},A8:{M:"midBoss"},A9:{M:"midBoss"},midBoss:{L:"B1",M:"B2",R:"B3"},B1:{L:"B4",R:"B5"},B2:{L:"B6",R:"B7"},B3:{L:"B8",R:"B9"},B4:{M:"B10"},B5:{L:"B10",R:"B11"},B6:{L:"B10",R:"B11"},B7:{L:"B11",R:"B12"},B8:{L:"B11",R:"B12"},B9:{M:"B12"},B10:{M:"finalBoss"},B11:{M:"finalBoss"},B12:{M:"finalBoss"}};
function moveRoom(dir){

  gameRef.child("eventResult").set("");
  gameRef.child("rewardResult").set("");

  gameRef.child("map/currentNode").once("value").then(s=>{

    const current=s.val()||"start";
    const next=moveMap[current]?.[dir];

    if(!next){
      alert("這方向不能前進");
      return;
    }
	
	gameRef.child("previousNode").set(current);
    gameRef.child("map/currentNode").set(next);
    triggerRoom(next);
  });
}

function goBackRoom(){

  gameRef.once("value").then(s=>{

    const data=s.val()||{};

    const current=data.map?.currentNode || "start";
    const prev=data.previousNode;

    if(!prev){
      setBattleLog("沒有可返回的位置。");
      return;
    }

    gameRef.child("previousNode").set(current);
    gameRef.child("map/currentNode").set(prev);

    triggerRoom(prev);

    setBattleLog("返回上一房："+prev);
  });
}

function clearResultPopup(){

  gameRef.update({

    eventResult:"",
    rewardResult:"",

    visualImage:"map"
  });

  setBattleLog("事件 / 怪物獎勵提示已關閉。");
}

function setEventRoom(type,content){clearEnemy();battleState.active=false;updateBattleText();gameRef.update({roomInfo:{mode:"room",content:content},eventState:{active:true,type:type},eventResult:"",battleTurn:"none"});setBattleLog("事件開始：請按下擲骰子結果。");}
function triggerRoom(node){

  gameRef.child("roomMemory/"+node).once("value").then(ms=>{

    const memory=ms.val();

    if(memory){

      if(memory.kind==="enemy"){

        gameRef.child("enemy").set(memory.enemy);

        gameRef.child("roomInfo").set({
          mode:"enemy",
          content:""
        });

        setVisualImage(memory.visualImage||"map");

        startBattle();

        return;
      }

      if(memory.kind==="event"){

        clearEnemy();

        battleState.active=false;
        updateBattleText();

        gameRef.child("roomInfo").set(memory.roomInfo);

        gameRef.child("eventState").set(memory.eventState);

        setVisualImage(memory.visualImage||"map");

        return;
      }
    }

    if(node==="midBoss"){

      gameRef.child("eventResult").set("");

      const enemy={
        name:"星環觀測者",
        hp:25,
        maxHp:25,
        atk:5,
        hit:"7+",
        drop:"💰160銀幣＋🧪回復藥 x1",
        interfereDebuff:0
      };

      gameRef.child("enemy").set(enemy);

      gameRef.child("roomMemory/"+node).set({
        kind:"enemy",
        enemy:enemy,
        visualImage:"boss1"
      });

      setVisualImage("boss1");

      gameRef.child("roomInfo").set({
        mode:"enemy",
        content:""
      });

      startBattle();

      return;
    }

    if(node==="finalBoss"){

      gameRef.child("eventResult").set("");

      const enemy={
        name:"時序裁定者",
        hp:40,
        maxHp:40,
        atk:5,
        hit:"7+",
        drop:"真相＋神秘寶物",
        interfereDebuff:0
      };

      gameRef.child("enemy").set(enemy);

      gameRef.child("roomMemory/"+node).set({
        kind:"enemy",
        enemy:enemy,
        visualImage:"boss2"
      });

      setVisualImage("boss2");

      gameRef.child("roomInfo").set({
        mode:"enemy",
        content:""
      });

      startBattle();

      return;
    }

    gameRef.child("map/roomTypes/"+node).once("value").then(s=>{

      const type=s.val();

      if(type==="monster"){

        gameRef.child("eventResult").set("");

        let enemy;
        let visualImage;

        if(node.startsWith("A")){

          const picked=randomPick([
            {
              enemy:{name:"齒輪兵",hp:6,maxHp:6,atk:2,hit:"6+",drop:"💰40銀幣",interfereDebuff:0},
              visual:"monster_a1"
            },
            {
              enemy:{name:"齒輪巡狼",hp:10,maxHp:10,atk:3,hit:"7+",drop:"💰60銀幣",interfereDebuff:0},
              visual:"monster_b1"
            },
            {
              enemy:{name:"齒液獸",hp:14,maxHp:14,atk:4,hit:"8+",drop:"💰80銀幣",interfereDebuff:0},
              visual:"monster_c1"
            }
          ]);

          enemy=picked.enemy;
          visualImage=picked.visual;

        }else{

          const picked=randomPick([
            {
              enemy:{name:"齒輪騎士",hp:8,maxHp:8,atk:3,hit:"6+",drop:"💰60銀幣",interfereDebuff:0},
              visual:"monster_a2"
            },
            {
              enemy:{name:"狂化齒狼",hp:12,maxHp:12,atk:4,hit:"7+",drop:"💰80銀幣",interfereDebuff:0},
              visual:"monster_b2"
            },
            {
              enemy:{name:"喰鐵齒液獸",hp:16,maxHp:16,atk:5,hit:"8+",drop:"💰100銀幣",interfereDebuff:0},
              visual:"monster_c2"
            }
          ]);

          enemy=picked.enemy;
          visualImage=picked.visual;
        }

        gameRef.child("enemy").set(enemy);

        gameRef.child("roomMemory/"+node).set({
          kind:"enemy",
          enemy:enemy,
          visualImage:visualImage
        });

        setVisualImage(visualImage);

        gameRef.child("roomInfo").set({
          mode:"enemy",
          content:""
        });

        startBattle();

        return;
      }

      clearEnemy();

      battleState.active=false;
      updateBattleText();

      if(type==="luck"){

        const roomInfo={
          mode:"room",
          content:`🍀【幸運房】
━━━━━━━━━━━━
❌ 失敗｜擲出2～5
無事發生

🟡 普通｜擲出6～10
獲得 💰100銀幣＋🧪高級回復藥 ×1

🟢 大成功｜擲出11～12
獲得 💰200金＋🧪 高級回復藥 ×1`
        };

        const eventState={
          active:true,
          type:"luck"
        };

        gameRef.child("roomInfo").set(roomInfo);
        gameRef.child("eventState").set(eventState);
        setVisualImage("luckrm");

        gameRef.child("roomMemory/"+node).set({
          kind:"event",
          roomInfo:roomInfo,
          eventState:eventState,
          visualImage:"luckrm"
        });

        return;
      }

      const event=randomPick([
        {
          type:"chest",
          visual:"rm_Chest",
          text:`💎【寶箱房】
━━━━━━━━━━━━
❌ 失敗｜擲出2～5
無法開啟 + 扣 2HP

🟡 普通｜擲出6～10
獲得 💰80銀幣＋🧪回復藥 ×1

🟢 大成功｜擲出11～12
獲得 💰160銀幣＋🧪高級回復藥 ×1`
        },
        {
          type:"trap",
          visual:"rm_trap",
          text:`⚠️【陷阱房】
━━━━━━━━━━━━
❌ 失敗｜擲出2～5
扣 6HP＋隨機失去1個道具

🟡 普通｜擲出6～10
扣 4HP

🟢 大成功｜擲出11～12
獲得 💰20銀幣`
        },
        {
          type:"wanderer",
          visual:"wanderer",
          text:`🌀【時空流浪者】
━━━━━━━━━━━━
特殊道具：

⚔️ 強化武器：攻擊 +3

🛡️ 時間護盾：免傷3回合

💖 生命全回復`
        }
      ]);

      let visualImage=event.visual;

      if(event.type==="wanderer"){

        gameRef.child("merchantCount").once("value").then(cs=>{

          const count=Number(cs.val()||0)+1;

          gameRef.child("merchantCount").set(count);

          visualImage=count>=2 ? "rm_merchant2" : "rm_merchant";

          const roomInfo={
            mode:"room",
            content:event.text
          };

          const eventState={
            active:true,
            type:event.type
          };

          gameRef.child("roomInfo").set(roomInfo);
          gameRef.child("eventState").set(eventState);
          setVisualImage(visualImage);

          gameRef.child("roomMemory/"+node).set({
            kind:"event",
            roomInfo:roomInfo,
            eventState:eventState,
            visualImage:visualImage
          });
        });

        return;
      }

      const roomInfo={
        mode:"room",
        content:event.text
      };

      const eventState={
        active:true,
        type:event.type
      };

      gameRef.child("roomInfo").set(roomInfo);
      gameRef.child("eventState").set(eventState);
      setVisualImage(visualImage);

      gameRef.child("roomMemory/"+node).set({
        kind:"event",
        roomInfo:roomInfo,
        eventState:eventState,
        visualImage:visualImage
      });
    });
  });
}
function startBattle(){
  battleState.active=true;
  battleState.phase="player1";
  gameRef.child("eventState").set(null);
  updateBattleText();
  setBattleLog("戰鬥開始！");
}

function endBattle(text){
  battleState.active=false;
  updateBattleText();
  setBattleLog(text);
}


function finishEnemyBattle(log, enemy){
  gameRef.child("rewardResult").set(enemy.drop || "未知獎勵");
  gameRef.child("visualImage").set("map");
  endBattle(log + "\n怪物被擊敗！");
}

function hitRequired(hit){return Number(String(hit).replace("+",""));}function alive(p){return p&&Number(p.hp)>0;}
function damageAllPlayers(players,amount){const updates={};["player1","player2"].forEach(k=>{const p=players[k];if(!alive(p))return;updates["players/"+k+"/hp"]=Math.max(0,Number(p.hp)-amount);});return updates;}
function resolveEvent(value,type,players){

  let result="";
  let finalValue=value;

  ["player1","player2"].forEach(k=>{
    const p=players[k];

    if(p && Number(p.active?.interfereBuff||0)>0){
      finalValue=Math.min(12,finalValue+2);
    }
  });

  let updates={
    eventState:null,
    battleTurn:"none",
    visualImage:"map"
  };

  if(type==="trap"){
    if(finalValue<=5){
      Object.assign(updates,damageAllPlayers(players,6));
      result="大失敗: 失去6HP, 失去1個道具";
    }else if(finalValue<=10){
      Object.assign(updates,damageAllPlayers(players,4));
      result="失敗: 失去4HP";
    }else{
      result="大成功: 獲得💰20銀幣";
    }
  }

  if(type==="chest"){
    if(finalValue<=5){
      Object.assign(updates,damageAllPlayers(players,2));
      result="大失敗: 無法開啟, 並失去2HP";
    }else if(finalValue<=10){
      result="成功: 獲得💰80銀幣 + 🧪 回復藥 ×1";
    }else{
      result="大成功: 獲得💰160銀幣 + 🧪 高級回復藥 ×1";
    }
  }

  if(type==="luck"){
    if(finalValue<=5){
      result="大失敗: 無任何事發生";
    }else if(finalValue<=10){
      result="成功: 獲得💰100銀幣 + 🧪 高級回復藥 ×1";
    }else{
      result="大成功: 獲得💰200銀幣 + 🧪 高級回復藥 ×1";
    }
  }

  if(type==="wanderer"){
    result="時空流浪者: 事件結束";
  }

  ["player1","player2"].forEach(k=>{
    const p=players[k];

    if(p && Number(p.active?.interfereBuff||0)>0){
      updates["players/"+k+"/active/interfereBuff"]=0;
    }
  });

  updates.eventResult=result;

  gameRef.update(updates);

  setBattleLog(
    "事件結果：\n"+
    result+
    `\n(最終骰值：${finalValue})`
  );
}
function rollDice(value){gameRef.once("value").then(s=>{const data=s.val()||{};const enemy=data.enemy||{};const players=data.players||{};if(data.eventState&&data.eventState.active){resolveEvent(value,data.eventState.type,players);return;}if(!battleState.active)return;if(battleState.phase==="player1"){const p=players.player1;if(alive(p)){let finalValue=value;
let log="";

if(Number(p.active?.interfereBuff||0)>0){

  finalValue=Math.min(12,value+2);

  log=
    `冒險者1 擲出 ${value}\n`
    +`干涉+2 → ${finalValue}\n`;

}else{

  log=`冒險者1 擲出 ${value}\n`;
}if(finalValue>=hitRequired(p.hit)){let damage=Number(p.atk)||0;if(p.job==="潛行者"&&finalValue>=9)damage+=1;if(p.active?.weaponBoost)damage+=3;const nextHp=Math.max(0,Number(enemy.hp)-damage);gameRef.child("enemy/hp").set(nextHp);log+=`命中！造成 ${damage} 傷害`;if(nextHp<=0){
  finishEnemyBattle(log, enemy);
  return;
}}else log+="未命中";
if(Number(p.active?.interfereBuff||0)>0){

  gameRef.child(
    "players/player1/active/interfereBuff"
  ).set(0);
}

setBattleLog(log);}battleState.phase=alive(players.player2)?"player2":"enemy";updateBattleText();return;}if(battleState.phase==="player2"){const p=players.player2;
if(alive(p)){

  let finalValue=value;
  let log="";

  if(Number(p.active?.interfereBuff||0)>0){

    finalValue=Math.min(12,value+2);

    log=
      `冒險者2 擲出 ${value}\n`
      +`干涉+2 → ${finalValue}\n`;

  }else{

    log=`冒險者2 擲出 ${value}\n`;
  }if(finalValue>=hitRequired(p.hit)){let damage=Number(p.atk)||0;if(p.job==="潛行者"&&finalValue>=9)damage+=1;if(p.active?.weaponBoost)damage+=3;const nextHp=Math.max(0,Number(enemy.hp)-damage);gameRef.child("enemy/hp").set(nextHp);log+=`命中！造成 ${damage} 傷害`;if(nextHp<=0){
  finishEnemyBattle(log, enemy);
  return;
}}else log+="未命中";
if(Number(p.active?.interfereBuff||0)>0){

  gameRef.child(
    "players/player2/active/interfereBuff"
  ).set(0);
}


setBattleLog(log);}battleState.phase="enemy";updateBattleText();return;}if(battleState.phase==="enemy"){

  let log=`怪物 擲出 ${value}\n`;

  const updates={};

  let finalEnemyValue=value;

if(Number(enemy.interfereDebuff||0)>0){

  finalEnemyValue=Math.max(2,value-2);

  log+=`\n干涉-2 → ${finalEnemyValue}`;
}

const monsterHit =
  finalEnemyValue>=hitRequired(enemy.hit);

  ["player1","player2"].forEach(k=>{

    const p=players[k];

    if(!alive(p))return;

    let damage=0;

    const shieldTurns=Number(p.active?.shieldTurns||0);

    if(monsterHit){

      damage=Math.max(
        0,
        Number(enemy.atk)-Number(p.def||0)
      );

      if(shieldTurns>0){
        damage=0;
        log+=`\n${k==="player1"?"冒險者1":"冒險者2"} 時間護盾生效，傷害歸0`;
      }else{
        log+=`\n${k==="player1"?"冒險者1":"冒險者2"} 受到 ${damage} 傷害`;
      }

      updates["players/"+k+"/hp"]=
        Math.max(0,Number(p.hp)-damage);

    }else{

      log+=`\n${k==="player1"?"冒險者1":"冒險者2"} 未被命中`;
    }

    if(shieldTurns>0){

      updates["players/"+k+"/active/shieldTurns"]=
        Math.max(0,shieldTurns-1);
    }
  });

  if(!monsterHit){
    log+="\n怪物攻擊未命中，但時間護盾仍會消耗1回合";
  }
  
  if(Number(enemy.interfereDebuff||0)>0){

  updates["enemy/interfereDebuff"]=0;
}

  gameRef.update(updates);

  setBattleLog(log);

  battleState.phase="player1";

  updateBattleText();

  return;
}



});
}

  battleState={
    active:false,

  gameRef.set({
