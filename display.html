<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>8號時間迷宮｜顯示頁</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

<style>

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:auto;

  background:#000;

  color:#fff;
  font-family:"Noto Sans TC",sans-serif;
}

.screen{
  height:100vh;
  padding:22px;
  box-sizing:border-box;

  display:grid;
  grid-template-columns:1fr 1.05fr;
  gap:22px;
}

.left{
  display:grid;
  grid-template-rows:44% 55%;
  gap:22px;
}

.panel{
  border:2px solid rgba(184,120,69,.75);

  border-radius:72px;

  padding:26px;
  box-sizing:border-box;
  overflow:auto;

  background-image:
    linear-gradient(rgba(25,15,5,.18),rgba(25,15,5,.18)),
    url("https://kissshot1385.github.io/yume.game.io/bg.png");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;
}

.turnActive{
  animation:turnGlow 1s infinite alternate;
}

@keyframes turnGlow{

  from{
    box-shadow:
      0 0 10px rgba(255,211,106,.3),
      0 0 20px rgba(255,211,106,.25);
  }

  to{
    box-shadow:
      0 0 25px rgba(255,211,106,.9),
      0 0 45px rgba(255,211,106,.6);
  }
}

h1{
  margin:0 0 16px;
  font-size:42px;
}

h2{
  margin:0 0 12px;
  font-size:30px;
}

.stat{
  font-size:24px;
  margin:8px 0;
  color:#f4e6c8;
}

.players{
  height:100%;
  display:flex;
  gap:18px;
}

.playerCard{
  flex:1;

  border:1px solid #8b6b3e;

  border-radius:42px;

  padding:18px;

  background:rgba(21,17,13,.6);

  display:flex;
  flex-direction:column;
  justify-content:space-around;
}

.playerCard h2{
  font-size:clamp(28px,2.6vw,42px);
}

.playerCard .stat{
  font-size:clamp(24px,2.2vw,36px);
}

.playerCard .box{
  font-size:clamp(20px,1.8vw,30px);
  padding:10px 14px;
}

.hpWrap{
  position:relative;
  margin:12px 0;
}

.bar{
  width:100%;
  height:34px;

  background:#7b1f1f;

  border:2px solid #d0a45a;

  border-radius:24px;

  overflow:auto;
}

.fill{
  height:100%;
  background:#29a745;
  transition:.3s;
  box-shadow:inset 0 0 10px rgba(0,0,0,.6);
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.box{
  border:1px solid #8b6b3e;

  padding:8px 12px;

  border-radius:22px;

  font-size:20px;

  min-width:96px;

  text-align:center;
}

#infoContent{
  height:100%;

  padding:0 12px 24px 0;

  box-sizing:border-box;

  overflow:auto;
}

#infoContent .row{
  margin-top:18px;
}

#infoContent .box{
  min-width:180px;
  min-height:58px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:clamp(20px,1.8vw,30px);
}

.enemyName{
  font-size:clamp(34px,3vw,52px);

  font-weight:bold;

  margin-bottom:18px;
}

.enemyHp{
  font-size:clamp(30px,2.6vw,46px);

  margin-top:14px;
  margin-bottom:14px;
}

.empty{
  opacity:.35;
}

.flash-damage .bar{
  animation:damageFlash .45s ease-in-out;
}

@keyframes damageFlash{

  0%{
    background:#7b1f1f;
  }

  30%{
    background:#ff2b2b;
    box-shadow:0 0 25px #ff3333;
  }

  100%{
    background:#7b1f1f;
  }
}

.flash-heal .bar{
  animation:healFlash .6s ease-in-out;
}

@keyframes healFlash{

  0%{
    background:#7b1f1f;
  }

  30%{
    background:#00ff88;
    box-shadow:0 0 30px #00ff88;
  }

  100%{
    background:#7b1f1f;
  }
}

.float-number{
  position:absolute;

  left:50%;
  top:-12px;

  transform:translateX(-50%);

  font-size:32px;

  font-weight:bold;

  pointer-events:none;

  animation:floatUp 1s ease-out forwards;

  z-index:20;

  text-shadow:0 0 12px currentColor;
}

.float-damage{
  color:#ff4b4b;
}

.float-heal{
  color:#00ff88;
}

@keyframes floatUp{

  0%{
    opacity:0;
    transform:translate(-50%,10px) scale(.8);
  }

  20%{
    opacity:1;
    transform:translate(-50%,-6px) scale(1.15);
  }

  100%{
    opacity:0;
    transform:translate(-50%,-56px) scale(1);
  }
}

.roomText{
  width:100%;
  height:100%;

  box-sizing:border-box;

  font-size:clamp(34px,3.8vw,56px);

  line-height:1.2;

  white-space:pre-line;

  color:#fff;

  display:flex;
  flex-direction:column;
  justify-content:flex-start;

  margin-top:-8px;
}

.mapPanel{
  padding:0;
  background-image:
    linear-gradient(rgba(25,15,5,.18),rgba(25,15,5,.18)),
    url("https://kissshot1385.github.io/yume.game.io/bg.png");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

.mapStage{
  position:relative;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.mapCanvas{
  position:relative;
  height:100%;
  width:100%;
  max-width:100%;
}

.mapImage{
  position:absolute;

  left:0;
  top:-6%;

  width:100%;
  height:112%;

  object-fit:contain;
  object-position:center;

  z-index:1;
  pointer-events:none;

  transition:opacity .35s ease;
}

.mapImage.loading{
  opacity:0;
}



.mapImage.fullCover{
  left:0;
  top:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  border-radius:72px;
}

.mapSvg{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  background:transparent;

  border:none;

  z-index:2;
}

.nodeText{
  font-size:3.8px;

  fill:#000;

  font-weight:bold;

  text-anchor:middle;
  dominant-baseline:middle;
}

.currentStar{
  font-size:7px;

  fill:#ffd36a;

  text-anchor:middle;
  dominant-baseline:middle;
}

.bossLabel{
  font-size:4.6px;

  fill:#3a1208;

  font-weight:900;

  text-anchor:middle;
  dominant-baseline:middle;

  paint-order:stroke;

  stroke:rgba(255,255,255,.55);
  stroke-width:.45px;
}

.centerPopup{
  position:fixed;

  left:50%;
  top:50%;

  transform:translate(-50%,-50%);

  min-width:48vw;
  max-width:72vw;

  padding:28px 42px;

  border-radius:38px;

  border:3px solid #ffd36a;

  background:
    linear-gradient(
      rgba(30,20,10,.96),
      rgba(20,12,6,.96)
    );

  color:#ffe7a3;

  font-size:clamp(34px,2.8vw,64px);

  font-weight:900;

  text-align:center;

  z-index:99999;

  display:none;

  box-shadow:
    0 0 30px rgba(255,211,106,.55),
    0 0 80px rgba(255,211,106,.25);

  animation:popupGlow 1.2s infinite alternate;
}

@keyframes popupGlow{

  from{
    box-shadow:
      0 0 25px rgba(255,211,106,.45),
      0 0 60px rgba(255,211,106,.18);
  }

  to{
    box-shadow:
      0 0 45px rgba(255,211,106,.9),
      0 0 100px rgba(255,211,106,.45);
  }
}

</style>
</head>

<body>

<div class="screen">

  <div class="left">

    <div class="panel" id="playerPanel">

      <div class="players" id="players"></div>

    </div>

    <div class="panel" id="enemyPanel">

      

      <div id="infoContent"></div>

    </div>

  </div>

  <div class="panel mapPanel">

    

    <div class="mapStage">

      <div class="mapCanvas">
 
		<img class="mapImage" id="mapImage" src="https://kissshot1385.github.io/yume.game.io/map.png">

        <svg
          class="mapSvg"
          id="mapSvg"
          viewBox="0 0 100 100"
        ></svg>

      </div>

    </div>

  </div>

</div>

<div id="centerPopup" class="centerPopup"></div>

<script>

var firebaseConfig = {

  apiKey: "AIzaSyA9463bcgt_R9KWU5dXx0xrKQtCEBdLwkE",
  authDomain: "yume-game.firebaseapp.com",
  databaseURL: "https://yume-game-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "yume-game",
  storageBucket: "yume-game.firebasestorage.app",
  messagingSenderId: "902572378872",
  appId: "1:902572378872:web:293ba940026c628b94c90d",
  measurementId: "G-BD8GMZR2B5"

};

firebase.initializeApp(firebaseConfig);

var db=firebase.database();

let lastEnemyHp=null;
let lastPlayerHp={player1:null,player2:null};

const nodes={
  finalBoss:[50,-8],

  B10:[20.5,8],
  B11:[49,8],
  B12:[79.5,8],

  B4:[10,25],
  B5:[25.7,25],
  B6:[42.5,25],
  B7:[57.5,25],
  B8:[73.8,25],
  B9:[89.8,25],

  B1:[23.8,42.5],
  B2:[50,42.5],
  B3:[76.2,42.5],

  midBoss:[50,58.5 ],

  A7:[21.3,72],
  A8:[50,72],
  A9:[78.7,72],

  A4:[14.5,84],
  A5:[50,84],
  A6:[85.5,84],

  A1:[20.5,96],
  A2:[50,96],
  A3:[79.5,96],

  start:[50,109]
};

const revealMap={
  start:["A1","A2","A3"],
  A1:["A4","A5"],
  A2:["A4","A5","A6"],
  A3:["A5","A6"],
  A4:["A7","A8"],
  A5:["A7","A8","A9"],
  A6:["A8","A9"],
  A7:["midBoss"],
  A8:["midBoss"],
  A9:["midBoss"],
  midBoss:["B1","B2","B3"],
  B1:["B4","B5"],
  B2:["B6","B7"],
  B3:["B8","B9"],
  B4:["B10"],
  B5:["B10","B11"],
  B6:["B10","B11"],
  B7:["B11","B12"],
  B8:["B11","B12"],
  B9:["B12"],
  B10:["finalBoss"],
  B11:["finalBoss"],
  B12:["finalBoss"]
};

const visualImages={
  map:"map.png",

  monster_a1:"monster_a1.png",
  monster_a2:"monster_a2.png",
  monster_b1:"monster_b1.png",
  monster_b2:"monster_b2.png",
  monster_c1:"monster_c1.png",
  monster_c2:"monster_c2.png",

  boss1:"boss1.png",
  boss2:"boss2.png",

  rm_Chest:"rm_Chest.png",
  rm_trap:"rm_trap.png",
  luckrm:"luckrm.png",
  rm_merchant:"rm_merchant.png",
  rm_merchant2:"rm_merchant2.png"
};

Object.values(visualImages).forEach(file=>{

  const img=new Image();

  img.src=
    "https://kissshot1385.github.io/yume.game.io/"
    +file;
});

function hpPercent(hp,maxHp){
  return Math.max(0,Math.min(100,Number(hp)/Number(maxHp)*100));
}

function roomLabel(type){

  if(type==="monster") return "怪物";
  if(type==="question") return "事件";
  if(type==="luck") return "✨幸運";

  return "";
}

function flash(id,type){

  const el=document.getElementById(id);

  if(!el)return;

  el.classList.remove(type);

  void el.offsetWidth;

  el.classList.add(type);
}

function showFloatNumber(id,amount){

  const el=document.getElementById(id);

  if(!el||amount===0)return;

  const num=document.createElement("div");

  num.className="float-number "+(
    amount>0?"float-heal":"float-damage"
  );

  num.innerText=amount>0?"+"+amount:String(amount);

  el.appendChild(num);

  setTimeout(()=>num.remove(),1000);
}

function renderPlayer(p,label,key,infoMerchant){

  if(!p||!p.job)return "";

  const percent=hpPercent(p.hp||0,p.maxHp||1);

let activeHtml="";

activeHtml+=`
  <div class="box ${(p.active&&p.active.weaponBoost)?"":"empty"}">
    強化武器
  </div>
`;

if(Number(p.active?.shieldTurns||0)>0){

  activeHtml+=`
    <div class="box">
      時間護盾：${p.active.shieldTurns}
    </div>
  `;

}else if(p.active?.shieldOwned){

  activeHtml+=`
    <div class="box">
      時間護盾：持有
    </div>
  `;

}else{

  activeHtml+=`
    <div class="box empty">
      時間護盾
    </div>
  `;
}

if(Number(p.active?.interfereBuff||0)>0){

  activeHtml+=`
    <div class="box">
      干涉+2
    </div>
  `;
}

  if(infoMerchant){
    activeHtml+=`<div class="box">情報商</div>`;
  }

  return `
  <div class="playerCard">

    <h2>${label}</h2>

    <div class="stat">
      職業：${p.job}
    </div>

    <div class="hpWrap" id="${key}BarBox">

      <div class="bar">
        <div
          class="fill"
          style="width:${percent}%"
        ></div>
      </div>

    </div>

    <div class="stat">
      HP：${p.hp??0} / ${p.maxHp??0}
    </div>

    <div class="row">

      <div class="box">
        攻擊力：${p.atk??0}
      </div>

      <div class="box">
        命中：${p.hit||"-"}
      </div>

      ${
        p.job==="潛行者"
        ?`<div class="box">9+ 傷害 +1</div>`
        :""
      }

      ${
        p.job==="干涉者"
        ?`<div class="box">干涉：${p.interfere??5}/5</div>`
        :""
      }

      <div class="box">
        防禦力：${p.def??0}
      </div>

    </div>

    <h2 style="margin-top:16px;">狀態</h2>

    <div class="row">${activeHtml}</div>

  </div>`;
}

function renderEnemy(e){

  const hp=Number(e.hp||0);
  const max=Number(e.maxHp||0);

  const percent=hpPercent(hp,max||1);

  return `
  <div class="enemyName">
    敵人：${e.name||"未出現"}
  </div>

  <div class="hpWrap" id="enemyBarBox">

    <div class="bar">
      <div
        class="fill"
        style="width:${percent}%"
      ></div>
    </div>

  </div>

  <div class="enemyHp">
    HP：${hp} / ${max}
  </div>

  <div class="row">

    <div class="box">
      攻擊力：${e.atk??0}
    </div>

<div class="box">
  命中：
  ${e.hit||"-"}

  ${
    Number(e.interfereDebuff||0)>0
    ?`<br>干涉-2`
    :""
  }
</div>

  </div>`;
}

function renderRoom(roomInfo){

  return `
  <div class="roomText">
    ${roomInfo?.content||"尚未發現房間內容。"}
  </div>`;
}


function drawMap(current,roomTypes){

  const svg=document.getElementById("mapSvg");

  let html="";

  const visible=new Set();

  if(revealMap[current]){
    revealMap[current].forEach(n=>visible.add(n));
  }

  visible.add(current);

  Object.keys(nodes).forEach(id=>{

    if(!(id.startsWith("A") || id.startsWith("B"))) return;

    const [x,y]=nodes[id];

    const forceShowLuck=
      window.currentInfoMerchant===true &&
      roomTypes?.[id]==="luck";

    if(visible.has(id) || forceShowLuck){

      html+=`
        <text class="nodeText"
              x="${x}"
              y="${y}">
          ${roomLabel(roomTypes?.[id])}
        </text>
      `;
    }
  });

  html+=`
    <text class="bossLabel"
          x="${nodes.midBoss[0]}"
          y="${nodes.midBoss[1]}">
      中級BOSS
    </text>

    <text class="bossLabel"
          x="${nodes.finalBoss[0]}"
          y="${nodes.finalBoss[1]}">
      最終BOSS
    </text>
  `;

  if(nodes[current]){

    const [x,y]=nodes[current];

    html+=`
      <text class="currentStar"
            x="${x}"
            y="${y}">
        ★
      </text>
    `;
  }

  svg.innerHTML=html;
}

function showCenterPopup(text){

  const box=document.getElementById("centerPopup");

  if(!text){

    box.style.display="none";

    return;
  }

  box.innerHTML=text;

  box.style.display="block";
}

function hideCenterPopup(){

  document.getElementById("centerPopup").style.display="none";
}

db.ref().on("value",snap=>{

  const data=snap.val()||{};

  const players=data.players||{};
  const enemy=data.enemy||{};

  const roomInfo=data.roomInfo||{
    mode:"room",
    content:"請選擇方向，進入8號時間迷宮。"
  };

  const map=data.map||{
    currentNode:"start",
    roomTypes:{}
  };
const visual=data.visualImage || "map";

const mapImage=document.getElementById("mapImage");

const nextSrc =
  "https://kissshot1385.github.io/yume.game.io/" +
  (visualImages[visual] || "map.png");

if(mapImage.src!==nextSrc){

  mapImage.classList.add("loading");

  const temp=new Image();

  temp.onload=()=>{

    mapImage.src=nextSrc;

    mapImage.classList.remove("loading");
  };

  temp.src=nextSrc;
}

if(visual==="map"){

  mapImage.classList.remove("fullCover");

}else{

  mapImage.classList.add("fullCover");
}


  window.currentInfoMerchant=data.infoMerchant;

  document.getElementById("players").innerHTML=
    renderPlayer(
      players.player1,
      "玩家1",
      "player1",
      data.infoMerchant
    )+
    renderPlayer(
      players.player2,
      "玩家2",
      "player2",
      data.infoMerchant
    );


  document.getElementById("infoContent").innerHTML=
    roomInfo.mode==="enemy"
    ?renderEnemy(enemy)
    :renderRoom(roomInfo);

  const playerPanel=document.getElementById("playerPanel");
  const enemyPanel=document.getElementById("enemyPanel");

  playerPanel.classList.remove("turnActive");
  enemyPanel.classList.remove("turnActive");

  if(
    data.battleTurn==="player1" ||
    data.battleTurn==="player2"
  ){
    playerPanel.classList.add("turnActive");
  }

  if(data.battleTurn==="enemy"){
    enemyPanel.classList.add("turnActive");
  }

  ["player1","player2"].forEach(k=>{

    const cur=players[k];

    if(cur&&cur.job){

      const now=Number(cur.hp||0);

      const prev=lastPlayerHp[k];

      if(prev!==null){

        const diff=now-Number(prev);

        if(diff!==0){

          if(diff<0){

            flash(k+"BarBox","flash-damage");

            setTimeout(()=>{
              showFloatNumber(k+"BarBox",diff);
            },10);
          }

          if(diff>0){

            flash(k+"BarBox","flash-heal");

            setTimeout(()=>{
              showFloatNumber(k+"BarBox",diff);
            },10);
          }
        }
      }

      lastPlayerHp[k]=now;
    }
  });

  const enemyHp=Number(enemy.hp||0);

  if(lastEnemyHp!==null){

    const diff=enemyHp-Number(lastEnemyHp);

    if(diff<0){

      flash("enemyBarBox","flash-damage");

      setTimeout(()=>{
        showFloatNumber("enemyBarBox",diff);
      },10);
    }

    if(diff>0){

      flash("enemyBarBox","flash-heal");

      setTimeout(()=>{
        showFloatNumber("enemyBarBox",diff);
      },10);
    }
  }

  if(data.eventResult){

  showCenterPopup(
    "✨事件結果✨<br><br>"+data.eventResult
  );

}
else if(data.rewardResult){

  showCenterPopup(
    "🎁掉落獎勵🎁<br><br>"+data.rewardResult
  );

}
else{

  hideCenterPopup();
}

  lastEnemyHp=enemyHp;

  if(visual==="map"){
  document.getElementById("mapSvg").style.display="block";

  drawMap(
    map.currentNode||"start",
    map.roomTypes||{}
  );
}else{
  document.getElementById("mapSvg").style.display="none";
}
});

</script>

</body>
</html>
